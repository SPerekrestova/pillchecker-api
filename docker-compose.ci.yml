# CI override — use pre-built image, no volume mounts, no nginx.
# Usage: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d api biomcp
services:
  api:
    image: pillchecker-api:ci
    entrypoint: ["/app/scripts/ci-startup.sh"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes: []
    environment:
      - HF_HOME=/app/models
      - BIOMCP_URL=http://biomcp:8080/mcp
    restart: "no"

  nginx:
    profiles:
      - disabled
